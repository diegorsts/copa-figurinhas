<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/copa-figurinhas/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Figurinhas" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Copa Figurinhas 2026</title>
    <script>
      // Restaura a rota após redirecionamento do 404.html
      (function() {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect)
        }
        // Lê o parâmetro ?p= gerado pelo 404.html
        var p = window.location.search
        if (p && p.indexOf('?p=/') === 0) {
          var path = p.slice(3).replace(/~and~/g, '&')
          var rest = path.split('&q=')
          history.replaceState(null, null,
            window.location.pathname.split('?')[0] + rest[0] +
            (rest[1] ? '?' + rest[1] : '') +
            window.location.hash
          )
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
